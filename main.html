
<!DOCTYPE html>
<html>
<head>
<title>Size Chart</title>

<style>
table{
    border-collapse: collapse;
    width: 60%;
    margin: 30px auto;
    font-family: Arial, sans-serif;
}

th, td{
    border:1px solid black;
    padding:10px;
    text-align:center;
}

th{
    background-color:#f2f2f2;
}
</style>

</head>

<body>

<h2 style="text-align:center;">Size Chart</h2>

<table>

<thead>
<tr>
<th>Size</th>
<th>Chest (inches)</th>
<th>Waist (inches)</th>
<th>Length (inches)</th>
</tr>
</thead>

<tbody>
<tr>
<td>S</td>
<td>38</td>
<td>36</td>
<td>27</td>
</tr>

<tr>
<td>M</td>
<td>40</td>
<td>38</td>
<td>28</td>
</tr>

<tr>
<td>L</td>
<td>42</td>
<td>40</td>
<td>29</td>
</tr>

<tr>
<td>XL</td>
<td>44</td>
<td>42</td>
<td>30</td>
</tr>

<tr>
<td>XXL</td>
<td>46</td>
<td>44</td>
<td>31</td>
</tr>

</tbody>

</table>

</body>
</html>
